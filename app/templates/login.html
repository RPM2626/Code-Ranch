{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="animal-banner">🐮 🌸 🐂 🌸 🐮</div>
    <div class="logo">🐄</div>

    <h1>Bulls & Cows</h1>
    <h3>Login</h3>
    <div class="cute-row">Welcome back, cowgirl 💖</div>

    <form>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button class="btn" type="submit">Login</button>
    </form>

    <p class="note">Don't have an account?</p>
    <a class="btn btn-secondary" href="{{ url_for('game_views.signup') }}">Sign up</a>
</div>
{% endblock %}
